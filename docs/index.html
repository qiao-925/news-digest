<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>每日新闻简报</title>
<script>
// 自动跳转到今天的简报
const d = new Date();
const today = d.getFullYear() + '-' +
  String(d.getMonth()+1).padStart(2,'0') + '-' +
  String(d.getDate()).padStart(2,'0');
window.location.href = 'news-digest-' + today + '.html';
</script>
</head>
<body>
<p>正在跳转到今日简报...</p>
</body>
</html>
